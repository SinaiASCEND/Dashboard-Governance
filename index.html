  <style>/* Curriculum Dashboard — shared styles
   Brand: Cyan #00AEEF primary, Magenta #D80B8C CTA, Violet #221F72 (sparingly), Cool Grey 11 #58595B
*/

:root {
  /* Brand */
  --brand-cyan: #00AEEF;
  --brand-cyan-deep: #008CC0;
  --brand-cyan-tint: #E5F6FD;
  --brand-magenta: #D80B8C;
  --brand-magenta-deep: #B0086F;
  --brand-violet: #221F72;
  --brand-violet-tint: #E9E8F1;
  --ink: #141414;
  --ink-2: #2A2A2C;
  --grey-11: #58595B;
  --grey-7: #8A8B8E;
  --grey-5: #B7B8BB;
  --grey-3: #DEDFE2;
  --grey-2: #ECEDEF;
  --grey-1: #F5F6F7;
  --paper: #FFFFFF;

  /* Semantic */
  --good: #1F8A4C;
  --good-tint: #E4F3EA;
  --warn: #B0710A;
  --warn-tint: #FAF1DC;
  --bad: #B82B1E;
  --bad-tint: #FAE5E2;

  /* Type */
  --serif: "Source Serif 4", "Source Serif Pro", Georgia, serif;
  --sans: "Inter Tight", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, Menlo, monospace;

  /* Layout */
  --radius: 6px;
  --radius-lg: 10px;
  --shadow-sm: 0 1px 2px rgba(20,20,20,0.04), 0 0 0 1px rgba(20,20,20,0.06);
  --shadow-md: 0 2px 8px rgba(20,20,20,0.06), 0 0 0 1px rgba(20,20,20,0.06);
}

[data-density="compact"] {
  --row-pad: 6px 10px;
  --card-pad: 14px;
  --gap: 10px;
}
[data-density="comfortable"] {
  --row-pad: 12px 14px;
  --card-pad: 22px;
  --gap: 18px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  color: var(--ink);
  background: var(--paper);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.dash {
  width: 1440px;
  background: var(--paper);
  font-size: 13px;
  line-height: 1.45;
}

/* Type roles */
.t-eyebrow { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey-11); font-weight: 600; }
.t-num { font-family: var(--sans); font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }
.t-mono { font-family: var(--mono); font-feature-settings: "tnum"; }
.t-serif { font-family: var(--serif); }

h1, h2, h3, h4 { margin: 0; font-weight: 600; letter-spacing: -0.01em; }
h1 { font-size: 28px; line-height: 1.15; }
h2 { font-size: 20px; line-height: 1.25; }
h3 { font-size: 15px; line-height: 1.3; }
h4 { font-size: 13px; line-height: 1.3; color: var(--grey-11); font-weight: 600; }

a { color: var(--brand-cyan-deep); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Top bar */
.topbar {
  display: flex; align-items: center; gap: 16px;
  height: 56px; padding: 0 24px;
  border-bottom: 1px solid var(--grey-3);
  background: var(--paper);
}
.topbar .logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--serif); font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
}
.topbar .logo .dot { width: 10px; height: 10px; border-radius: 2px; background: var(--brand-cyan); }
.topbar .crumbs { display:flex; align-items:center; gap:8px; color: var(--grey-11); font-size: 12.5px; }
.topbar .crumbs .sep { color: var(--grey-5); }
.topbar .spacer { flex: 1; }
.topbar .role-switch {
  display: flex; gap: 0; border: 1px solid var(--grey-3); border-radius: 999px; padding: 2px; background: var(--grey-1);
}
.topbar .role-switch button {
  border: 0; background: transparent; padding: 5px 12px; border-radius: 999px;
  font: inherit; font-size: 12px; color: var(--grey-11); cursor: pointer;
}
.topbar .role-switch button.active { background: var(--paper); color: var(--ink); box-shadow: var(--shadow-sm); }
.topbar .icon-btn {
  width: 32px; height: 32px; border-radius: var(--radius); border: 1px solid var(--grey-3);
  background: var(--paper); display: grid; place-items: center; cursor: pointer; color: var(--grey-11);
}
.topbar .cta {
  background: var(--brand-magenta); color: white; border: 0; padding: 7px 14px; border-radius: var(--radius);
  font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 0.01em;
}
.topbar .cta:hover { background: var(--brand-magenta-deep); }

/* Side nav */
.sidenav {
  width: 232px; flex: 0 0 232px;
  border-right: 1px solid var(--grey-3);
  padding: 16px 8px;
  font-size: 12.5px;
  /* Stay visible while the main column scrolls. */
  position: sticky;
  top: 0;
  align-self: flex-start;
  max-height: 100vh;
  overflow-y: auto;
  background: var(--paper);
  z-index: 5;
}
.sidenav .group { margin-bottom: 14px; }
.sidenav .group-label { padding: 4px 12px; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey-7); font-weight: 600; }
.sidenav a, .sidenav .nav-item {
  display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-radius: var(--radius);
  color: var(--ink-2); cursor: pointer; text-decoration: none;
}
.sidenav a:hover, .sidenav .nav-item:hover { background: var(--grey-1); }
.sidenav a.active, .sidenav .nav-item.active {
  background: var(--brand-cyan-tint); color: var(--brand-cyan-deep); font-weight: 600;
}
.sidenav .nav-item .badge { margin-left:auto; font-size: 10.5px; color: var(--grey-11); background: var(--grey-2); border-radius: 999px; padding: 1px 7px; }

/* Cards */
.card {
  background: var(--paper);
  border: 1px solid var(--grey-3);
  border-radius: var(--radius-lg);
  padding: var(--card-pad, 18px);
}
.card .card-header {
  display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
  margin-bottom: 12px;
}
.card .card-title { font-size: 13px; color: var(--grey-11); font-weight: 600; letter-spacing: 0.01em; }
.card .card-meta { font-size: 11.5px; color: var(--grey-7); }

/* KPI */
.kpi { display: flex; flex-direction: column; gap: 4px; }
.kpi .kpi-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey-11); font-weight: 600; }
.kpi .kpi-value { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.kpi .kpi-value .unit { font-size: 16px; color: var(--grey-11); margin-left: 2px; font-weight: 500; }
.kpi .kpi-delta { font-size: 11.5px; color: var(--grey-11); display: flex; align-items: center; gap: 6px; }
.kpi .kpi-delta.good { color: var(--good); }
.kpi .kpi-delta.bad  { color: var(--bad); }

/* Pills / chips */
.pill { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; border: 1px solid transparent; line-height: 1.6; }
.pill.muted { background: var(--grey-1); color: var(--grey-11); border-color: var(--grey-3); }
.pill.cyan { background: var(--brand-cyan-tint); color: var(--brand-cyan-deep); }
.pill.violet { background: var(--brand-violet-tint); color: var(--brand-violet); }
.pill.good { background: var(--good-tint); color: var(--good); }
.pill.warn { background: var(--warn-tint); color: var(--warn); }
.pill.bad  { background: var(--bad-tint); color: var(--bad); }
.pill.outline { background: var(--paper); color: var(--grey-11); border-color: var(--grey-3); }

/* Table */
.tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.tbl th { text-align: left; font-weight: 600; color: var(--grey-11); padding: 8px 10px; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px solid var(--grey-3); }
.tbl td { padding: var(--row-pad, 10px); border-bottom: 1px solid var(--grey-2); vertical-align: middle; }
.tbl tr:hover td { background: var(--grey-1); }
.tbl td.num, .tbl th.num { text-align: right; font-variant-numeric: tabular-nums; }
.tbl td.mono { font-family: var(--mono); font-size: 11.5px; }

/* Bars */
.bar-track { background: var(--grey-2); height: 6px; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--brand-cyan); border-radius: 3px; }
.bar-fill.good { background: var(--good); }
.bar-fill.warn { background: var(--warn); }
.bar-fill.bad  { background: var(--bad); }
.bar-fill.violet { background: var(--brand-violet); }

/* Heatmap cell */
.heat-cell {
  display: grid; place-items: center;
  font-family: var(--mono); font-size: 10.5px; color: var(--ink);
  border-radius: 3px;
  height: 28px;
}

/* Buttons */
.btn { font: inherit; font-size: 12px; padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--grey-3); background: var(--paper); color: var(--ink); cursor: pointer; }
.btn:hover { background: var(--grey-1); }
.btn.primary { background: var(--brand-cyan); border-color: var(--brand-cyan); color: white; }
.btn.primary:hover { background: var(--brand-cyan-deep); border-color: var(--brand-cyan-deep); }
.btn.ghost { border-color: transparent; }

/* Tabs */
.tabs { display: flex; gap: 18px; border-bottom: 1px solid var(--grey-3); }
.tabs .tab { padding: 10px 2px; font-size: 12.5px; color: var(--grey-11); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tabs .tab.active { color: var(--ink); border-bottom-color: var(--brand-cyan); font-weight: 600; }

/* Sparkline */
.spark { display: inline-block; vertical-align: middle; }

/* Section */
.section-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 12px; gap: 12px; }
.section-head h2 { font-family: var(--serif); font-weight: 600; letter-spacing: -0.01em; }

/* Synthetic data marker */
.synth-mark { font-size: 10px; color: var(--grey-7); font-style: italic; }

/* Utility */
.row { display: flex; align-items: center; gap: 8px; }
.col { display: flex; flex-direction: column; gap: 8px; }
.muted { color: var(--grey-11); }
.dim { color: var(--grey-7); }
hr.sep { border: 0; border-top: 1px solid var(--grey-3); margin: 16px 0; }

.grid-12 { display: grid; grid-template-columns: repeat(12, 1fr); gap: var(--gap, 14px); }

/* Phase color stripes (subtle) */
.phase-Foundations { --phase: var(--brand-cyan); }
.phase-Systems     { --phase: var(--brand-violet); }
.phase-Longitudinal{ --phase: var(--grey-11); }
.phase-Clerkship   { --phase: var(--brand-magenta); }
</style>
