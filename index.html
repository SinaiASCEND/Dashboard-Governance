<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1480" />
  <title>ASCEND Curriculum Governance Dashboard — Icahn School of Medicine at Mount Sinai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    /* EEC-specific tweaks */
    :root {
      --font-serif: "Source Serif 4", "Source Serif Pro", Georgia, serif;
      --font-sans: "Inter Tight", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, Menlo, monospace;
    }
    body { background: var(--grey-1); }
    /* Make .card a bit lighter for governance */
    .card { background: var(--paper); }
    /* Custom scrollbar for drawers */
    aside::-webkit-scrollbar { width: 10px; }
    aside::-webkit-scrollbar-thumb { background: var(--grey-3); border-radius: 5px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#221F72">

      <g transform="translate(200,160)" fill="#ffffff">
        <rect x="0" y="0" width="380" height="48" rx="4"></rect>
        <rect x="0" y="68" width="280" height="14" rx="2" opacity="0.7"></rect>
        <rect x="0" y="100" width="120" height="120" rx="6" opacity="0.95"></rect>
